name: Daily Trending Collection

# 매일 UTC 21:30 (= KST 익일 06:30) 자동 실행 + 수동 트리거 가능
on:
  schedule:
    - cron: "30 21 * * *"
  workflow_dispatch:

# GITHUB_TOKEN에 push 권한 부여 (워크플로우가 raw CSV를 커밋해야 함)
permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # 커밋·푸시를 위해 토큰 명시
          token: ${{ secrets.GITHUB_TOKEN }}
          # 깊이 0 = 전체 히스토리 (push 시 충돌 회피)
          fetch-depth: 0

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ApeWisdom collection
        run: python run.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/raw/ data/runs/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(daily): trending snapshot $(date -u +%Y-%m-%d)"
            git push
          fi
